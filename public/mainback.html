<head>
  <title>dynasty</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.3.2/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.min.js"></script>
</head>

<body>
  <h1>Welcome to Dynasty!</h1>

  {{> createCoatOfArms}}

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

<template name="createCoatOfArms">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-12 bg-light p-3">
            <h2 class="text-center">Controls</h2>

            <div id="accordion" class="accordion">

              <!-- Add this in your sidebar, where you have the other dropdowns -->
<div class="card">
    <div class="card-header d-flex align-items-center text-center p-3" id="headingBanner">
        <h5 class="mb-0">
            <button class="btn btn-link" data-toggle="collapse" data-target="#collapseBanner" aria-expanded="true" aria-controls="collapseBanner">
                Select Banner
            </button>
        </h5>
    </div>
    <div id="collapseBanner" class="collapse" aria-labelledby="headingBanner" data-parent="#accordion">
        <div class="card-body">
            {{#each banners}}
                <img src="/banners/{{this}}" class="banner-thumbnail" data-banner="{{this}}">
            {{/each}}
        </div>
    </div>
</div>

<!-- Add this below the banner selection card -->
<div class="form-group">
    <label for="bannerText">Banner Text</label>
    <input type="text" class="form-control" id="bannerText" placeholder="Enter text">
</div>




              <div class="card">
                  <div class="card-header d-flex align-items-center text-center p-3" id="headingFrame">
                      <h5 class="mb-0">
                          <button class="btn btn-link" data-toggle="collapse" data-target="#collapseFrame" aria-expanded="true" aria-controls="collapseFrame">
                              Select Frame
                          </button>
                      </h5>
                  </div>
                  <div id="collapseFrame" class="collapse" aria-labelledby="headingFrame" data-parent="#accordion">
                      <div class="card-body">
                          {{#each frames}}
                              <img src="/frames/{{this}}" class="frame-thumbnail" data-frame="{{this}}">
                          {{/each}}
                      </div>
                  </div>
              </div>

              <div class="card">
                  <div class="card-header d-flex align-items-center text-center p-3" id="headingCrown">
                      <h5 class="mb-0">
                          <button class="btn btn-link" data-toggle="collapse" data-target="#collapseCrown" aria-expanded="true" aria-controls="collapseCrown">
                              Select Crown
                          </button>
                      </h5>
                  </div>
                  <div id="collapseCrown" class="collapse" aria-labelledby="headingCrown" data-parent="#accordion">
                      <div class="card-body">
                          {{#each crowns}}
                              <img src="/crowns/{{this}}" class="crown-thumbnail" data-crown="{{this}}">
                          {{/each}}
                      </div>
                  </div>
              </div>

                <div class="card">
                    <div class="card-header d-flex align-items-center text-center p-3" id="headingLeftAnimal">
                        <h5 class="mb-0">
                            <button class="btn btn-link" data-toggle="collapse" data-target="#collapseLeftAnimal" aria-expanded="true" aria-controls="collapseLeftAnimal">
                                Select Left Animal
                            </button>
                        </h5>
                    </div>
                    <div id="collapseLeftAnimal" class="collapse" aria-labelledby="headingLeftAnimal" data-parent="#accordion">
                        <div class="card-body">
                            {{#each animals}}
                                <img src="/animals/{{this}}" class="animal-thumbnail animal-thumbnail-left" data-animal="{{this}}">
                            {{/each}}
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header d-flex align-items-center text-center p-3" id="headingRightAnimal">
                        <h5 class="mb-0">
                            <button class="btn btn-link" data-toggle="collapse" data-target="#collapseRightAnimal" aria-expanded="true" aria-controls="collapseRightAnimal">
                                Select Right Animal
                            </button>
                        </h5>
                    </div>
                    <div id="collapseRightAnimal" class="collapse" aria-labelledby="headingRightAnimal" data-parent="#accordion">
                        <div class="card-body">
                            {{#each animals}}
                                <img src="/animals/{{this}}" class="animal-thumbnail animal-thumbnail-right" data-animal="{{this}}">
                            {{/each}}
                        </div>
                    </div>
                </div>



                <div class="card">
                    <div class="card-header d-flex align-items-center text-center p-3" id="headingFlag">
                        <h5 class="mb-0">
                            <button class="btn btn-link" data-toggle="collapse" data-target="#collapseFlag" aria-expanded="true" aria-controls="collapseFlag">
                                Select Flag
                            </button>
                        </h5>
                    </div>
                    <div id="collapseFlag" class="collapse" aria-labelledby="headingFlag" data-parent="#accordion">
                        <div class="card-body">
                            {{#each flags}}
                                <img src="/flags/{{this}}" class="flag-thumbnail" data-flag="{{this}}">
                            {{/each}}
                        </div>
                    </div>
                </div>



            </div>

            <!-- Download Button -->
            <div class="text-center mt-3">
                <button id="download" class="btn btn-primary download-btn">Download PNG</button>
            </div>
        </div>

        <!-- Main content -->
        <div class="col-md-9 col-12">
            <div class="coat-of-arms-container">
                <div class="coat-of-arms-elements">

                  <!-- Add this in your coat-of-arms-elements div -->
<div class="coat-of-arms-banner-container">

                  <div class="coat-of-arms-banner">
                      <img id="selected-banner" src="">
                      <svg xmlns="http://www.w3.org/2000/svg" width="300" height="100" id="banner-svg">
       <path id="text-curve-path" d="M10,50 Q150,90 290,50" fill="none" stroke="black"/>
      <text fill="#D2B48C" font-size="2em" font-family="'Cinzel', sans-serif">
          <textPath href="#text-curve-path" startOffset="10%">
              <tspan id="banner-text"></tspan>
          </textPath>
      </text>
  </svg>

                  </div>
</div>

                  <div class="coat-of-arms-crown">
       <img id="selected-crown" src="">
   </div>
                    <img id="selected-animal-left" class="coat-of-arms-animal" src="">

                    <div class="coat-of-arms-frame">
                        <img id="selected-frame" src="">
                        <div class="coat-of-arms-flag">
                            <img id="selected-flag" src="">
                        </div>
                    </div>
                    <img id="selected-animal-right" class="coat-of-arms-animal" src="">
                </div>
            </div>
        </div>
    </div>
</template>
